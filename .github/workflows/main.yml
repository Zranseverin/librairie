name: Deploy to Production

on:
  workflow_dispatch:  # Permet un déclenchement manuel
  push:
    branches:
      - master  # Se déclenche sur push vers master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install NPM dependencies
        run: npm ci
      
      - name: Build assets
        run: npm run build
      
      - name: Health check
        run: |
          sleep 10
          if curl -s -o /dev/null -w "%{http_code}" https://show-lib.severinzran.ci/ | grep -q "200"; then
            echo "✅ Site accessible !"
          else
            echo "⚠️ Vérifiez les logs du serveur"
          fi
